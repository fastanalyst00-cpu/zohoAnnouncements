<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Carousel</title>

<!-- Swiper CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: transparent;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    overflow: hidden;
  }

  .swiper {
    width: 100%;
    height: 100vh;
  }

  .swiper-slide {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f4f4f4;
    overflow: hidden;
  }

  .swiper-slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .caption {
    position: absolute;
    bottom: 24px;
    left: 32px;
    right: 32px;
    color: #ffffff;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
    z-index: 10;
    pointer-events: none;
  }

  .caption::before {
    content: "";
    position: absolute;
    left: -32px;
    right: -32px;
    bottom: -24px;
    height: 140px;
    background: linear-gradient(to top, rgba(0,0,0,0.55), rgba(0,0,0,0));
    z-index: -1;
  }

  .swiper-pagination-bullet { background: #ffffff; opacity: 0.5; }
  .swiper-pagination-bullet-active { background: #ffffff; opacity: 1; }
  .swiper-button-next, .swiper-button-prev {
    color: #ffffff;
    --swiper-navigation-size: 28px;
  }

  /* Status panel shown during load or on error */
  .status {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
    color: #444;
    font-size: 15px;
    line-height: 1.5;
    background: #f9f9f9;
  }
  .status.error {
    background: #fff3f3;
    color: #8b0000;
  }
  .status code {
    background: rgba(0,0,0,0.08);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px;
  }
</style>
</head>
<body>

<div id="status" class="status">Loading images…</div>

<div class="swiper" id="carousel" style="display:none;">
  <div class="swiper-wrapper" id="slides"></div>
  <div class="swiper-pagination"></div>
  <div class="swiper-button-next"></div>
  <div class="swiper-button-prev"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
  // ================================================================
  //  CONFIG — edit these three values to match YOUR GitHub repo.
  //
  //  Example: if your repo URL is
  //      https://github.com/danielcruz/dashboard-carousel
  //  then:
  //      GITHUB_USER  = "danielcruz"
  //      GITHUB_REPO  = "dashboard-carousel"
  // ================================================================
  const GITHUB_USER    = "your-github-username";
  const GITHUB_REPO    = "your-repo-name";
  const IMAGES_FOLDER  = "images";
  const GITHUB_BRANCH  = "main";     // "main" for most repos, "master" for older ones

  const AUTOPLAY_DELAY_MS = 4000;
  const TRANSITION_EFFECT = "fade";  // "fade" or "slide"
  // ================================================================

  const statusEl   = document.getElementById("status");
  const carouselEl = document.getElementById("carousel");
  const slidesEl   = document.getElementById("slides");

  function showError(message) {
    statusEl.classList.add("error");
    statusEl.innerHTML = message;
  }

  // "RAM_Q3_Performance.jpg" -> "RAM Q3 Performance"
  function filenameToTitle(name) {
    return name.replace(/\.[^.]+$/, "").replace(/[_-]+/g, " ").trim();
  }

  async function loadImages() {
    const apiUrl =
      `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}` +
      `/contents/${IMAGES_FOLDER}?ref=${GITHUB_BRANCH}`;

    let response;
    try {
      response = await fetch(apiUrl);
    } catch (err) {
      showError(`Could not reach GitHub.<br><br><small>${err.message}</small>`);
      return;
    }

    if (response.status === 404) {
      showError(
        `GitHub returned <b>404 Not Found</b>.<br><br>` +
        `Check that <code>${GITHUB_USER}/${GITHUB_REPO}</code> is a <b>public</b> repo, ` +
        `the folder <code>${IMAGES_FOLDER}</code> exists, and the branch is <code>${GITHUB_BRANCH}</code>.`
      );
      return;
    }
    if (response.status === 403) {
      showError(`GitHub API rate limit reached. Try again in an hour.`);
      return;
    }
    if (!response.ok) {
      showError(`GitHub API error: ${response.status} ${response.statusText}`);
      return;
    }

    const files = await response.json();

    const images = files
      .filter(f => f.type === "file" && /\.(jpe?g|png|gif|webp|bmp)$/i.test(f.name))
      .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

    if (images.length === 0) {
      showError(
        `No images found in <code>${IMAGES_FOLDER}/</code>.<br><br>` +
        `Supported: .jpg .jpeg .png .gif .webp .bmp`
      );
      return;
    }

    slidesEl.innerHTML = images.map(img => {
      const title = filenameToTitle(img.name);
      return `
        <div class="swiper-slide">
          <img src="${img.download_url}" alt="${title}">
          <div class="caption">${title}</div>
        </div>
      `;
    }).join("");

    statusEl.style.display = "none";
    carouselEl.style.display = "block";

    new Swiper("#carousel", {
      loop: images.length > 1,
      effect: TRANSITION_EFFECT,
      fadeEffect: { crossFade: true },
      speed: 800,
      autoplay: {
        delay: AUTOPLAY_DELAY_MS,
        disableOnInteraction: false,
        pauseOnMouseEnter: false
      },
      pagination: { el: ".swiper-pagination", clickable: true },
      navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" }
    });
  }

  loadImages();
</script>

</body>
</html>
